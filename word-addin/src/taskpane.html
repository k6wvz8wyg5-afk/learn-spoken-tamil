<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gemini for Word</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      padding: 16px;
      background: #fafafa;
      color: #1a1a1a;
      font-size: 14px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #1a73e8;
    }
    .subtitle {
      font-size: 12px;
      color: #666;
      margin-bottom: 20px;
    }
    .section { margin-bottom: 16px; }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 8px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #444;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.1);
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
    }
    .btn:active { transform: scale(0.98); }
    .btn-send {
      background: linear-gradient(135deg, #4285f4, #9b72cb, #d96570);
      color: white;
      padding: 14px 16px;
      font-size: 15px;
    }
    .btn-send:hover { opacity: 0.9; }
    .btn-replace {
      background: #34a853;
      color: white;
    }
    .btn-replace:hover { background: #2d9249; }
    .btn-replace:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: none;
      border: none;
      color: #1a73e8;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 0;
      text-align: center;
      width: 100%;
      margin-top: 6px;
    }
    .btn-secondary:hover { text-decoration: underline; }
    .divider {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 20px 0;
    }
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      line-height: 1.5;
      resize: vertical;
      min-height: 160px;
      transition: border-color 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.1);
    }
    textarea::placeholder { color: #aaa; }
    #status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    #status.info { display: block; background: #e8f0fe; color: #1a73e8; }
    #status.error { display: block; background: #fce8e6; color: #d93025; }
    #status.success { display: block; background: #e6f4ea; color: #1e8e3e; }
    .selected-preview {
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 12px;
      color: #555;
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
      display: none;
    }
    .hint {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Gemini for Word</h1>
  <p class="subtitle">Select text, edit it with Gemini, paste it back</p>

  <div class="section">
    <div class="section-title">Send to Gemini</div>
    <label for="instruction">Instruction (optional)</label>
    <input type="text" id="instruction" placeholder="e.g. Rewrite this formally, Summarize this, Translate to Tamil..."/>
    <p class="hint">This gets prepended to your selected text on the clipboard</p>
  </div>

  <div class="section">
    <div id="selection-preview" class="selected-preview"></div>
    <button class="btn btn-send" id="send-btn">Copy Selection &amp; Open Gemini</button>
    <p class="hint" style="text-align:center; margin-top:6px;">Copies your selected text (with instruction) and opens Gemini</p>
  </div>

  <hr class="divider"/>

  <div class="section">
    <div class="section-title">Paste back from Gemini</div>
    <textarea id="paste-area" placeholder="Paste Gemini's response here..."></textarea>
  </div>

  <div class="section">
    <button class="btn btn-replace" id="replace-btn" disabled>Replace Selection in Document</button>
    <button class="btn-secondary" id="insert-end-btn">or insert at end of document</button>
  </div>

  <div id="status"></div>

  <script src="taskpane.js"></script>
</body>
</html>
